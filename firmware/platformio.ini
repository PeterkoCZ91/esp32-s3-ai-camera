[platformio]
src_dir = .
include_dir = ../../include
lib_dir = lib

[env:esp32-s3-devkitc-1]
platform = https://github.com/platformio/platform-espressif32.git
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
build_src_filter = +<*> -<lib/>
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEI_CLASSIFIER_TFLITE_ENABLE_ESP_NN=0
    -DEI_PORTING_ARDUINO=1
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.0
    framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.0/esp32-arduino-libs-3.0.0.zip
lib_deps =
    espressif/esp32-camera @ ^2.0.4
    bblanchon/ArduinoJson @ ^6.21.3
    ; ESP32-RTSPServer je v lib/ (lokální kopie s optimalizacemi)
    knolleary/PubSubClient @ ^2.8

; --- OTA Upload Settings ---
; Uncomment the following lines to enable OTA upload
; upload_protocol = espota
; upload_port = 192.168.68.51
; upload_flags =
;    --auth=S3cur3_ESP32_Outdoor!2025

